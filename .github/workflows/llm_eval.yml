name: LLM Evaluation Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "pipeline/**"
      - "eval/**"
      - "data/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "pipeline/**"
      - "eval/**"
      - "data/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/**"

permissions:
  contents: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.11"
  LLM_PROVIDER: mock
  LLM_MODEL: mock-model
  RAG_BACKEND: mock
  # Prevent HuggingFace from trying to reach the internet during downloads
  TRANSFORMERS_VERBOSITY: error
  TOKENIZERS_PARALLELISM: "false"

jobs:
  # в”Ђв”Ђ Job 1: Validate dataset schema в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  validate-dataset:
    name: "рџ“‹ Validate Golden Dataset"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install validation deps
        run: pip install jsonschema

      - name: Validate dataset schema
        run: python scripts/validate_dataset.py

  # в”Ђв”Ђ Job 2: Unit tests в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  unit-tests:
    name: "рџ§Є Unit Tests"
    runs-on: ubuntu-latest
    needs: validate-dataset
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v --tb=short \
            --cov=eval --cov=pipeline \
            --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # в”Ђв”Ђ Job 3: Cache NLI models в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  cache-models:
    name: "рџ“¦ Cache ML Models"
    runs-on: ubuntu-latest
    needs: unit-tests
    outputs:
      cache-hit: ${{ steps.model-cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache HuggingFace models
        id: model-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-nli-deberta-minilm-v1
          restore-keys: |
            hf-models-nli-deberta-minilm-

      - name: Download models (if not cached)
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          python -c "
          from sentence_transformers import CrossEncoder, SentenceTransformer
          CrossEncoder('cross-encoder/nli-deberta-v3-small')
          SentenceTransformer('all-MiniLM-L6-v2')
          print('Models downloaded and cached')
          "

  # в”Ђв”Ђ Job 4: Evaluation shards (parallelized) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  eval-suite:
    name: "вљ™пёЏ Eval Shard ${{ matrix.shard }}/${{ matrix.total }}"
    runs-on: ubuntu-latest
    needs: cache-models
    strategy:
      matrix:
        shard: [0, 1, 2, 3]
        total: [4]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore cached ML models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-nli-deberta-minilm-v1
          restore-keys: |
            hf-models-nli-deberta-minilm-

      - name: Run evaluation shard ${{ matrix.shard }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p results
          python -m eval.runner \
            --dataset data/golden_dataset.json \
            --shard ${{ matrix.shard }} \
            --total-shards ${{ matrix.total }} \
            --output-dir results

      - name: Upload shard results
        uses: actions/upload-artifact@v4
        with:
          name: shard-results-${{ matrix.shard }}
          path: results/*.json
          retention-days: 30

  # в”Ђв”Ђ Job 5: Merge shards + Gate check в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  gate-check:
    name: "рџљ¦ Gate Check & Merge Decision"
    runs-on: ubuntu-latest
    needs: eval-suite

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download all shard results
        uses: actions/download-artifact@v4
        with:
          pattern: shard-results-*
          path: results
          merge-multiple: true

      - name: Merge shards & run gate check
        id: gate
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/merge_and_gate.py --results-dir results --output gate_result.json
          GATE_PASSED=$(python -c 'import json; d=json.load(open("gate_result.json")); print(str(d["passed"]).lower())')
          echo "gate_passed=${GATE_PASSED}" >> "$GITHUB_OUTPUT"

      - name: Upload gate result artifact
        uses: actions/upload-artifact@v4
        with:
          name: gate-result
          path: gate_result.json
          retention-days: 30

      - name: Post PR comment with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('gate_result.json', 'utf8'));
            const m = result.metrics;
            const icon = result.passed ? 'вњ…' : 'рџљЁ';
            const status = result.passed ? 'PASSED вЂ” merge allowed' : 'FAILED вЂ” merge BLOCKED';

            let body = `## ${icon} LLM Eval Gate: ${status}\n\n`;
            body += `| Metric | Value | Threshold | Status |\n`;
            body += `|--------|-------|-----------|--------|\n`;
            body += `| Hallucination Rate | ${(m.hallucination_rate*100).toFixed(1)}% | в‰¤5% | ${m.hallucination_rate<=0.05?'вњ…':'вќЊ'} |\n`;
            body += `| p95 Latency | ${m.p95_latency_ms.toFixed(0)}ms | в‰¤5000ms | ${m.p95_latency_ms<=5000?'вњ…':'вќЊ'} |\n`;
            body += `| Answer Relevancy | ${m.mean_relevancy.toFixed(3)} | в‰Ґ0.70 | ${m.mean_relevancy>=0.70?'вњ…':'вљ пёЏ'} |\n`;
            body += `| Faithfulness | ${m.mean_faithfulness.toFixed(3)} | в‰Ґ0.75 | ${m.mean_faithfulness>=0.75?'вњ…':'вљ пёЏ'} |\n`;
            body += `| Cost/Query | $${m.mean_cost_per_query.toFixed(5)} | в‰¤$0.01 | ${m.mean_cost_per_query<=0.01?'вњ…':'вљ пёЏ'} |\n`;

            if (result.violations && result.violations.length > 0) {
              body += `\n### рџљЁ Blocking Violations\n`;
              result.violations.forEach(v => { body += `- **${v.metric}**: ${v.message}\n`; });
            }

            if (result.warnings && result.warnings.length > 0) {
              body += `\n### вљ пёЏ Warnings\n`;
              result.warnings.forEach(w => { body += `- **${w.metric}**: ${w.message}\n`; });
            }

            body += `\n> **Total**: ${result.total_questions} questions across ${result.shards} shard(s)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if gate blocked
        if: steps.gate.outputs.gate_passed == 'false'
        run: |
          echo "рџљЁ Gate check FAILED вЂ” blocking merge"
          exit 1

  # в”Ђв”Ђ Job 6: Update dashboard data в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  update-dashboard:
    name: "рџ“Љ Update Dashboard Data"
    runs-on: ubuntu-latest
    needs: gate-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all shard results
        uses: actions/download-artifact@v4
        with:
          pattern: shard-results-*
          path: results
          merge-multiple: true

      - name: Commit results to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet || git commit -m "ci: update eval results [skip ci]"
          git push
